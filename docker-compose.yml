version: '3.8'

services:
  web:
    build: .
    container_name: smart_farm_web
    expose:
      - "5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=production
    restart: always

  nginx:
    image: nginx:alpine
    container_name: smart_farm_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/app
    depends_on:
      - web
    restart: always

